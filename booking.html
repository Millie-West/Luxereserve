<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeReserve | 3D Experience</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #050507;
            --card-bg: rgba(20, 22, 28, 0.6);
            --accent: #66fcf1;
            --white: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--dark-bg);
            color: var(--white);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px; /* Establishes 3D space */
        }

        /* --- 3D Background Floating Shapes --- */
        .bg-shapes {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; transform-style: preserve-3d;
        }

        .cube {
            position: absolute;
            width: 100px; height: 100px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            background: rgba(212, 175, 55, 0.02);
            animation: spin 20s infinite linear;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }

        .cube:nth-child(1) { top: 15%; left: 10%; width: 150px; height: 150px; animation-duration: 25s; }
        .cube:nth-child(2) { bottom: 20%; right: 15%; width: 80px; height: 80px; animation-direction: reverse; }
        .cube:nth-child(3) { top: 40%; right: 25%; width: 120px; height: 120px; animation-duration: 30s; border-color: rgba(102, 252, 241, 0.2); }

        @keyframes spin {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) translateZ(-200px); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg) translateZ(100px); }
        }

        /* --- 3D Card Container --- */
        .tilt-wrapper {
            width: 100%; max-width: 800px;
            perspective: 1500px;
            z-index: 10;
        }

        .flip-inner {
            width: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flip-inner.is-flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(212, 175, 55, 0.05);
            backface-visibility: hidden; /* Hides the back of the element when flipped */
            -webkit-backface-visibility: hidden;
        }

        .card-back {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            transform: rotateY(180deg);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center;
            border: 1px solid var(--gold);
            box-sizing: border-box;
        }

        /* --- UI Elements --- */
        h2 { text-align: center; color: var(--gold); letter-spacing: 4px; margin-top: 0; margin-bottom: 2rem; transform: translateZ(50px); }
        
        .form-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; transform: translateZ(30px); }
        .full-width { grid-column: span 2; }
        .input-group { display: flex; flex-direction: column; }
        
        label { font-size: 0.75rem; color: var(--gold); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select {
            padding: 12px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            color: white; transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        .price-panel {
            grid-column: span 2; background: rgba(0,0,0,0.3);
            border-left: 3px solid var(--accent); padding: 15px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
            transform: translateZ(40px);
        }

        .total-val { font-size: 1.8rem; color: var(--accent); font-weight: bold; }

        button {
            grid-column: span 2; padding: 18px;
            background: linear-gradient(45deg, var(--gold), #ffdf00); color: black;
            border: none; border-radius: 10px; font-weight: 900;
            text-transform: uppercase; cursor: pointer;
            transition: all 0.3s ease; transform: translateZ(50px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        button:hover { transform: translateZ(60px) scale(1.02); box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4); }

        /* Back Card specific */
        .receipt-title { color: var(--accent); font-size: 2rem; margin-bottom: 10px; }
        .barcode { width: 80%; height: 60px; background: repeating-linear-gradient(90deg, #fff, #fff 2px, transparent 2px, transparent 6px, #fff 6px, #fff 10px, transparent 10px, transparent 12px); margin: 20px 0; opacity: 0.7; }

        .clock {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 1.2rem;
            color: var(--accent);
            background: rgba(20, 22, 28, 0.9);
            padding: 12px 18px;
            border-radius: 10px;
            border: 1px solid var(--accent);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
        }

    </style>
</head>
<body>

<div class="clock" id="clock">00:00:00</div>

<div class="bg-shapes">
    <div class="cube"></div>
    <div class="cube"></div>
    <div class="cube"></div>
</div>

<div class="tilt-wrapper" id="tilt-wrapper">
    <div class="flip-inner" id="flip-inner">
        
        <div class="card-front">
            <h2>LUXERESERVE</h2>
            <div style="text-align: right; margin-bottom: 10px;">
    <span onclick="logout()" style="color: var(--gold); font-size: 0.7rem; cursor: pointer; letter-spacing: 1px; border-bottom: 1px solid transparent; transition: 0.3s;" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='transparent'">
        TERMINAL LOGOUT ⏻
    </span>
</div>
            <div class="form-section">
                <div class="input-group">
                    <label>Guest Name</label>
                    <input type="text" id="name" placeholder="Enter full name">
                </div>
                <div class="input-group">
                    <label>Check-In Date</label>
                    <input type="date" id="checkin" onchange="calculate()">
                </div>
                <div class="input-group">
                    <label>Suite Tier</label>
                    <select id="tier" onchange="calculate()">
                        <option value="300">Orbit Standard ($300/nt)</option>
                        <option value="800">Zenith Penthouse ($800/nt)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Rooms</label>
                    <input type="number" id="rooms" value="1" min="1" onchange="calculate()">
                </div>

                <div class="price-panel">
                    <div>
                        <label style="margin:0;">Estimated Total</label>
                        <div style="font-size: 0.8rem; color: gray;">Taxes & fees included</div>
                    </div>
                    <div class="total-val" id="total-display">$0.00</div>
                </div>

                <button onclick="submitBooking()">Secure Reservation</button>
            </div>
        </div>

        <div class="card-back">
            <h2 class="receipt-title">ACCESS GRANTED</h2>
            <p>Welcome aboard, <span id="receipt-name" style="color:var(--gold); font-weight:bold;"></span>.</p>
            <p>Your suite has been secured for a total of <span id="receipt-total" style="color:var(--accent); font-weight:bold;"></span>.</p>
            
            <div class="barcode"></div>
            <p style="font-family: monospace; letter-spacing: 5px; color: gray;">TXN-84729-LX</p>
            <button onclick="saveToPDF()" style="background: transparent; color: var(--accent); border: 1px solid var(--accent); width: 60%; font-size: 0.7rem; margin-top: 10px;">
    DOWNLOAD DIGITAL PASS (PDF)
</button>
            
            <button onclick="resetBooking()" style="margin-top: 20px; width: 50%; padding: 10px;">Return</button>
        </div>

    </div>
</div>

<script>
    // --- 3D TILT EFFECT LOGIC ---
    const tiltWrapper = document.getElementById('tilt-wrapper');
    const flipInner = document.getElementById('flip-inner');
    let isFlipped = false;

    // Listen to mouse movement across the whole window
    document.addEventListener('mousemove', (e) => {
        if (isFlipped) return; // Stop tilting if looking at the receipt

        // Calculate mouse position relative to center of screen
        const xAxis = (window.innerWidth / 2 - e.pageX) / 40; 
        const yAxis = (window.innerHeight / 2 - e.pageY) / 40; 
        
        // Apply 3D rotation based on mouse coordinates
        flipInner.style.transform = `rotateY(${-xAxis}deg) rotateX(${yAxis}deg)`;
    });

    // Reset tilt when mouse leaves window
    document.addEventListener('mouseleave', () => {
        if (!isFlipped) {
            flipInner.style.transform = `rotateY(0deg) rotateX(0deg)`;
            flipInner.style.transition = `transform 0.5s ease`; // Smooth snap back
            setTimeout(() => { flipInner.style.transition = `transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)`; }, 500);
        }
    });

    // --- PRICING LOGIC ---
    function calculate() {
        const rate = parseFloat(document.getElementById('tier').value);
        const rooms = parseInt(document.getElementById('rooms').value) || 0;
        const total = rate * rooms; // Simplified for this demo
        
        if (document.getElementById('checkin').value) {
            document.getElementById('total-display').innerText = `$${total.toLocaleString()}`;
        }
    }

    // --- FLIP ANIMATION TRIGGERS ---
    function submitBooking() {
        const name = document.getElementById('name').value;
        const total = document.getElementById('total-display').innerText;

        if(!name || total === "$0.00") {
            alert("Please enter your name and select a date.");
            return;
        }

        // Populate the receipt on the back
        document.getElementById('receipt-name').innerText = name.toUpperCase();
        document.getElementById('receipt-total').innerText = total;

        // Trigger the 3D Flip
        isFlipped = true;
        flipInner.style.transform = `rotateY(180deg)`;
    }

    function resetBooking() {
        isFlipped = false;
        flipInner.style.transform = `rotateY(0deg) rotateX(0deg)`;
        
        // Clear form
        document.getElementById('name').value = '';
        document.getElementById('total-display').innerText = '$0.00';
    }

    // --- CLOCK UPDATE ---
    function updateClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;
    }

    updateClock();
    setInterval(updateClock, 1000);

    // Auto-fill the name field in the booking form from the login data
window.onload = () => {
    const savedName = sessionStorage.getItem("userName");
    if(savedName) document.getElementById('name').value = savedName;
}


    document.addEventListener('DOMContentLoaded', () => {
        // 1. Retrieve the data from sessionStorage
        const savedEmail = sessionStorage.getItem("userEmail");
        const savedName = sessionStorage.getItem("userName");

        // 2. Target the booking container or title
        const cardFront = document.querySelector('.card-front');
        
        if (savedEmail) {
            // 3. Create the greeting element
            const greeting = document.createElement('div');
            greeting.style.cssText = `
                text-align: center;
                color: var(--accent);
                font-size: 0.85rem;
                margin-bottom: 20px;
                padding: 10px;
                background: rgba(102, 252, 241, 0.1);
                border-radius: 8px;
                border: 1px solid rgba(102, 252, 241, 0.2);
                letter-spacing: 1px;
                animation: fadeInDown 0.8s ease forwards;
            `;
            
            // 4. Use the Name if available, otherwise use Email
            const displayName = savedName && savedName !== "Valued Guest" ? savedName : savedEmail;
            greeting.innerHTML = `WELCOME BACK, <span style="color:white; font-weight:bold;">${displayName.toUpperCase()}</span>`;

            // 5. Insert it at the top of the form
            cardFront.prepend(greeting);

            // 6. Pre-fill the name input field if it exists
            const nameInput = document.getElementById('name');
            if (nameInput && savedName) {
                nameInput.value = savedName;
            }
        }
    });

    // Add a simple animation for the greeting
    const style = document.createElement('style');
    style.innerHTML = `
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    `;
    document.head.appendChild(style);

    function logout() {
    // 1. Clear all session data
    sessionStorage.clear();

    // 2. Visual feedback (dim the card)
    const card = document.getElementById('flip-inner');
    card.style.opacity = '0';
    card.style.transform = 'scale(0.9) rotateY(-10deg)';
    card.style.transition = '0.5s';

    // 3. Redirect to login page after animation
    setTimeout(() => {
        window.location.href = "login.html";
    }, 500);
}

function saveToPDF() {
    // 1. Target the elements we want to hide
    const frontCard = document.querySelector('.card-front');
    const bgShapes = document.querySelector('.bg-shapes');
    const logoutBtn = document.querySelector('[onclick="logout()"]');

    // 2. Hide non-essential UI
    frontCard.style.display = 'none';
    bgShapes.style.display = 'none';
    if(logoutBtn) logoutBtn.style.display = 'none';

    // 3. Trigger Print (User can select "Save as PDF")
    window.print();

    // 4. Restore UI after printing finishes
    setTimeout(() => {
        frontCard.style.display = 'block';
        bgShapes.style.display = 'block';
        if(logoutBtn) logoutBtn.style.display = 'block';
    }, 500);
}
</script>

</body>
</html>
